name: Setup Environment
description: Sources .envrc and exports CI_ENVRC for scripts

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        KAITOSHOME="$(git rev-parse --show-toplevel)"
        echo "CI_ENVRC=source $KAITOSHOME/.envrc" >> "$GITHUB_ENV"
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
